<!DOCTYPE html>
<html lang="nb" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Excel 2.0 PRO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f4f4f6;--sf:#fff;--sf2:#ebebee;--sf3:#e0e0e4;
  --tx:#0d0d0f;--tx2:#5a5a66;--tx3:#9898a6;
  --bd:rgba(0,0,0,0.07);--bd2:rgba(0,0,0,0.14);
  --ac:#1c6ef3;--ac-bg:#eaf1ff;--ac-lt:#6aaeff;
  --green:#1a7a3c;--green-bg:#e6f5ec;--green-lt:#4caf74;
  --rd:#d93025;--rd-bg:#fce8e6;
  --gold:#b06000;--gold-bg:#fff4e0;
  --sh:0 1px 2px rgba(0,0,0,0.06),0 3px 10px rgba(0,0,0,0.05);
  --sh-md:0 2px 8px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.06);
  --r:10px;--rl:14px;--rxl:18px;
}
[data-theme="dark"]{
  --bg:#0e0e10;--sf:#18181c;--sf2:#222228;--sf3:#2c2c34;
  --tx:#f0f0f5;--tx2:#8888a0;--tx3:#55556a;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.14);
  --ac:#4a8fff;--ac-bg:#0d1e40;--ac-lt:#6aaeff;
  --green:#3db86a;--green-bg:#0a2018;--green-lt:#3db86a;
  --rd:#f06a60;--rd-bg:#2a0e0c;
  --gold:#f0a830;--gold-bg:#2a1e00;
  --sh:0 1px 2px rgba(0,0,0,0.3),0 3px 10px rgba(0,0,0,0.25);
  --sh-md:0 2px 8px rgba(0,0,0,0.4),0 8px 24px rgba(0,0,0,0.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px}
#app{max-width:600px;margin:0 auto;padding:24px 16px 100px}

/* ── LOGO ── */
.logo-wrap{display:flex;flex-direction:column;gap:4px}
.logo-main{position:relative;display:flex;align-items:center;gap:0;line-height:1}
.logo-bb{position:absolute;left:-6px;top:50%;transform:translateY(-50%);color:var(--ac);opacity:.1;pointer-events:none}
.logo-ex{font-size:38px;font-weight:900;letter-spacing:-2.5px;color:var(--tx);position:relative;padding-left:6px}
.logo-ver{font-size:38px;font-weight:900;letter-spacing:-2.5px;color:var(--ac);position:relative}
.logo-pro{font-size:10px;font-weight:800;color:var(--sf);background:var(--tx);padding:3px 7px;border-radius:4px;letter-spacing:.8px;margin-left:6px;align-self:center;position:relative;line-height:1.5}
.logo-sub{font-size:11px;color:var(--tx3);letter-spacing:.1px;font-style:italic}

/* ── LAYOUT ── */
.tbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
h1{font-size:20px;font-weight:800;letter-spacing:-.4px}
h2{font-size:15px;font-weight:700;margin-bottom:10px}
h3{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px}
.sub{font-size:13px;color:var(--tx2);margin-top:2px}
.card{background:var(--sf);border-radius:var(--rl);padding:16px;margin-bottom:12px;box-shadow:var(--sh);border:1px solid var(--bd)}
.lbl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:transparent;border:1px solid var(--bd2);border-radius:var(--r);padding:10px 16px;font-size:14px;cursor:pointer;color:var(--tx);font-family:inherit;min-height:42px;touch-action:manipulation;font-weight:500}
.btn:active{opacity:.55}
.btn.p{background:var(--tx);color:var(--sf);border-color:var(--tx)}
.btn.g{background:var(--green);color:#fff;border-color:var(--green);font-size:15px;font-weight:700}
.btn.d{color:var(--rd);border-color:transparent;background:var(--rd-bg)}
.btn.ghost{border-color:transparent;color:var(--tx2);background:transparent}
.btn.sm{padding:7px 12px;font-size:13px;min-height:34px;border-radius:8px}
.btn.ic{padding:0;min-width:38px;min-height:38px;border-radius:50%;background:var(--sf2);border:none}
.btn.fw{width:100%}
.btn.act.on{background:var(--ac-bg);border-color:var(--ac);color:var(--ac);font-weight:700}
/* icon-round: small round grey icon button */
.ic-btn{width:36px;height:36px;border-radius:50%;background:var(--sf2);border:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);flex-shrink:0}
.ic-btn:active{opacity:.6}

/* theme toggle */
.tbtn{width:38px;height:38px;border-radius:50%;background:var(--sf2);border:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2)}
.tbtn:active{opacity:.7}

/* ── INPUTS ── */
input[type=number],input[type=text],select{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:11px 13px;font-size:15px;color:var(--tx);font-family:inherit;min-height:44px;width:100%;-webkit-appearance:none;appearance:none}
input:focus,select:focus{outline:none;border-color:var(--ac);background:var(--sf);box-shadow:0 0 0 3px var(--ac-bg)}

/* ── GRID / TABS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:7px 13px;border-radius:var(--r);font-size:13px;cursor:pointer;border:1px solid transparent;min-height:34px;display:inline-flex;align-items:center;color:var(--tx2);font-weight:500}
.tab.on{border-color:var(--bd2);background:var(--sf);color:var(--tx);font-weight:700;box-shadow:var(--sh)}

/* ── WEEK / SESSION GRID ── */
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sc{border:1px solid var(--bd);border-radius:var(--rl);padding:14px;cursor:pointer;min-height:90px;background:var(--sf);box-shadow:var(--sh)}
.sc:active{opacity:.7}
.sc.done{background:var(--green-bg);border-color:var(--green-lt)}
.sc.done .sw,.sc.done .sn{color:var(--green)}
.sw{font-size:10px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.sn{font-size:14px;font-weight:700;margin-top:4px}
.sv{font-size:12px;color:var(--tx2);margin-top:4px}
.tag{display:inline-flex;align-items:center;font-size:11px;padding:3px 8px;border-radius:20px;background:var(--green-bg);color:var(--green);font-weight:700;margin-top:6px;border:1px solid var(--green-lt)}
.wnav{display:flex;align-items:center;justify-content:space-between;background:var(--sf);border-radius:var(--rl);padding:6px 8px;margin-bottom:16px;box-shadow:var(--sh);border:1px solid var(--bd)}
.wt{font-size:14px;font-weight:700}

/* ── SESSION ── */
.divider{height:1px;background:var(--bd);margin:16px 0}
.exc{border:1px solid var(--bd);border-radius:var(--rl);padding:13px;margin-bottom:10px;background:var(--sf)}
.en{font-weight:700!important;border:none!important;background:transparent!important;font-size:15px;width:100%!important;min-height:auto!important;padding:0!important;color:var(--tx)}
.prv{font-size:12px;color:var(--tx2);background:var(--sf2);border-radius:8px;padding:7px 11px;margin-bottom:8px;line-height:1.6;border-left:3px solid var(--ac)}
.shd{display:grid;grid-template-columns:26px 1fr 1fr 42px;gap:6px;padding-bottom:6px;border-bottom:1px solid var(--bd);margin-bottom:8px}
.sr{display:grid;grid-template-columns:26px 1fr 1fr 42px;gap:6px;align-items:center;margin-bottom:8px}
.sr input{text-align:center;padding:10px 4px;font-size:16px;font-weight:600}
.snum{font-size:12px;color:var(--tx3);text-align:center;font-weight:700}
.ch{font-size:10px;color:var(--tx3);text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.abar{background:var(--sf2);border-radius:var(--rl);padding:14px;margin-bottom:14px;border:1px solid var(--bd);display:flex;flex-direction:column;gap:8px}
.vbox{background:var(--sf);border-radius:var(--rxl);padding:20px;margin-top:14px;border:1px solid var(--bd);box-shadow:var(--sh-md)}
.vbig{font-size:38px;font-weight:800;color:var(--ac);letter-spacing:-1.5px}
.mpill{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--sf2);color:var(--tx2);font-weight:600;border:1px solid var(--bd)}
.mpill.cardio{background:var(--ac-bg);color:var(--ac);border-color:var(--ac-lt)}
.reptag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--sf2);color:var(--tx2);font-weight:700;border:1px solid var(--bd2)}
.cbox{background:var(--ac-bg);border-radius:var(--r);padding:12px;margin-top:6px;border:1px solid var(--ac-lt)}
.exrow{padding:12px 0;border-bottom:1px solid var(--bd)}
.exrow:last-child{border-bottom:none;padding-bottom:0}

/* ── PROGRESS ── */
.prog-bg{height:6px;background:var(--sf2);border-radius:3px;overflow:hidden;margin-bottom:16px}
.prog-fg{height:100%;background:var(--ac);border-radius:3px}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.sbox{background:var(--sf2);border-radius:var(--r);padding:12px 8px;text-align:center;border:1px solid var(--bd)}
.snum2{font-size:20px;font-weight:800;letter-spacing:-.5px}
.slbl{font-size:10px;color:var(--tx2);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.stabs{display:flex;background:var(--sf2);border-radius:var(--r);padding:3px;margin-bottom:14px;border:1px solid var(--bd);overflow-x:auto}
.stab{flex:1;padding:7px 3px;text-align:center;font-size:11px;font-weight:600;color:var(--tx2);border-radius:8px;cursor:pointer;white-space:nowrap}
.stab.on{background:var(--sf);color:var(--tx);box-shadow:var(--sh)}
.pr-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)}
.pr-row:last-child{border-bottom:none}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.ch2{font-size:10px;color:var(--tx3);text-align:center;font-weight:700;padding-bottom:3px}
.cd{aspect-ratio:1;border-radius:5px;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx3)}
.cd.tr{background:var(--green);color:#fff}

/* ── HISTORY / TEMPLATE CARDS ── */
.hcard{border:1px solid var(--bd);border-radius:var(--rl);padding:16px;margin-bottom:10px;cursor:pointer;background:var(--sf);box-shadow:var(--sh)}
.hcard:active{opacity:.7}
.hname{font-size:16px;font-weight:700;letter-spacing:-.2px}
.hmeta{font-size:12px;color:var(--tx2);margin-top:3px}
.tplcard{border:1px solid var(--bd2);border-radius:var(--rl);padding:16px;margin-bottom:10px;background:var(--sf);box-shadow:var(--sh)}
.tplcard-name{font-size:16px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:8px;color:var(--tx)}
.tplcard-meta{font-size:12px;color:var(--tx2);margin-top:3px;margin-bottom:12px}

/* ── EXPORT BUTTON ── */
.expbtn{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);cursor:pointer;width:100%;margin-bottom:10px;box-shadow:var(--sh);color:var(--tx);font-size:14px;font-weight:600;font-family:inherit}
.expbtn:active{opacity:.7}

/* ── ERR ── */
.err{color:var(--rd);font-size:14px;padding:14px;background:var(--rd-bg);border-radius:var(--r);margin-bottom:12px}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;height:64px;background:var(--sf);border-top:1px solid var(--bd);display:flex;z-index:100;box-shadow:0 -2px 16px rgba(0,0,0,0.07)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;color:var(--tx3);touch-action:manipulation}
.bni:active{opacity:.5}
.bni.on{color:var(--ac)}
.bni.off{opacity:.25;pointer-events:none}
.bni-ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.bni-lb{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const STKEY='tp_v15';
const MUSCLES=['Bryst','Rygg','Skuldre','Skulder bak','Skulder side','Biceps','Triceps','Bein','Lår','Rumpe','Hamstring','Mage','Legg'];
const ALL_MG=[...MUSCLES,'Kondisjon'];

/* ── SVG ICONS ── */
const IC={
  home:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>`,
  sessions:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="12" x2="5.5" y2="12"/><line x1="18.5" y1="12" x2="22" y2="12"/><rect x="0.5" y="10.5" width="3" height="3" rx=".5" fill="currentColor" stroke="none"/><rect x="20.5" y="10.5" width="3" height="3" rx=".5" fill="currentColor" stroke="none"/><rect x="4.5" y="8" width="2.5" height="8" rx=".5" fill="currentColor" stroke="none"/><rect x="17" y="8" width="2.5" height="8" rx=".5" fill="currentColor" stroke="none"/><line x1="7" y1="12" x2="17" y2="12"/></svg>`,
  stats:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>`,
  history:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>`,
  templates:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  export:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  sun:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`,
  moon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>`,
  barbell_bg:`<svg width="90" height="34" viewBox="0 0 90 34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="17" x2="82" y2="17"/><rect x="2" y="13" width="6" height="8" rx="1.5" fill="currentColor" stroke="none"/><rect x="82" y="13" width="6" height="8" rx="1.5" fill="currentColor" stroke="none"/><rect x="10" y="8" width="7" height="18" rx="1.5" fill="currentColor" stroke="none"/><rect x="73" y="8" width="7" height="18" rx="1.5" fill="currentColor" stroke="none"/></svg>`,
};

function save(s){try{localStorage.setItem(STKEY,JSON.stringify(s))}catch(e){}}
function load(){
  try{
    const r=localStorage.getItem(STKEY);if(!r)return null;
    const s=JSON.parse(r);
    if(!s.history)s.history=[];if(!s.theme)s.theme='light';if(!s.stab)s.stab='volume';if(!s.templates)s.templates=[];
    return s;
  }catch(e){return null;}
}
let ST=load()||{view:'home',program:null,history:[],templates:[],curWeek:0,curSess:null,histIdx:0,theme:'light',stab:'volume'};
let tDefs=[],tActive=0;

const fmt=d=>d?new Date(d).toLocaleDateString('nb-NO',{day:'numeric',month:'short',year:'numeric'}):'';
const fmtS=d=>d?new Date(d).toLocaleDateString('nb-NO',{day:'numeric',month:'short'}):'';
const today=()=>new Date().toISOString().slice(0,10);
const sVol=s=>s.exercises.filter(e=>e.type!=='cardio').reduce((a,ex)=>a+ex.sets.reduce((b,set)=>b+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0),0),0);
const sKm=s=>s.exercises.filter(e=>e.type==='cardio').reduce((a,ex)=>a+(parseFloat((ex.sets[0]||{}).km)||0),0);
const sMin=s=>s.exercises.filter(e=>e.type==='cardio').reduce((a,ex)=>a+(parseFloat((ex.sets[0]||{}).duration)||0),0);

function applyTheme(){document.documentElement.setAttribute('data-theme',ST.theme);}
applyTheme();

function ticon(){return ST.theme==='dark'?IC.sun:IC.moon;}

function bnav(active){
  const hp=!!ST.program;
  const items=[
    {id:'home',lb:'Hjem',ok:true},
    {id:'sessions',lb:'Økt',ok:hp},
    {id:'stats',lb:'Stats',ok:hp},
    {id:'history',lb:'Logg',ok:true},
    {id:'templates',lb:'Maler',ok:true},
  ];
  return`<div class="bnav">${items.map(it=>`<div class="bni${active===it.id?' on':''}${!it.ok?' off':''}" data-bn="${it.id}">
    <div class="bni-ic">${IC[it.id]}</div><div class="bni-lb">${it.lb}</div>
  </div>`).join('')}</div>`;
}

function bindNav(){
  document.querySelectorAll('[data-bn]').forEach(el=>{
    el.onclick=()=>{
      const t=el.dataset.bn;
      if(t==='home')ST.view='home';
      else if(t==='sessions'&&ST.program)ST.view='main';
      else if(t==='stats'&&ST.program){ST.stab='volume';ST.view='progress';}
      else if(t==='history')ST.view='history';
      else if(t==='templates')ST.view='templates';
      save(ST);render();
    };
  });
}

function render(){
  const el=document.getElementById('app');if(!el)return;
  try{
    const V={home:vHome,setup:vSetup,setupFromTpl:vSetupFromTpl,main:vMain,session:vSession,progress:vProgress,histDetail:vHistDetail,export:vExport,history:vHistory,templates:vTemplates,templateDetail:vTemplateDetail};
    el.innerHTML=V[ST.view]?V[ST.view]():vHome();
  }catch(e){
    el.innerHTML=`<div class="err">Feil: ${e.message}</div><button class="btn d fw" onclick="resetAll()">Nullstill data</button>`;
  }
  bindEvents();window.scrollTo(0,0);
}
function resetAll(){if(confirm('Nullstille all data?')){ST={view:'home',program:null,history:[],templates:ST.templates||[],curWeek:0,curSess:null,histIdx:0,theme:ST.theme,stab:'volume'};save(ST);render();}}

function appHeader(){
  return`<div class="tbar" style="margin-bottom:28px">
    <div class="logo-wrap">
      <div class="logo-main">
        <div class="logo-bb">${IC.barbell_bg}</div>
        <span class="logo-ex">EXCEL</span><span class="logo-ver">2.0</span><span class="logo-pro">PRO</span>
      </div>
      <div class="logo-sub">spreadsheet nerd goes app</div>
    </div>
    <button class="tbtn" id="bTheme">${ticon()}</button>
  </div>`;
}

/* ── HOME ── */
function vHome(){
  let h=appHeader();
  if(ST.program){
    const p=ST.program,done=p.sessions.filter(s=>s.done).length,tot=p.weeks*p.sessionsPerWeek,pct=Math.round(done/tot*100);
    h+=`<div class="card">
      <div class="lbl">Aktiv periode</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:10px;letter-spacing:-.3px">${p.name}</div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--tx2);margin-bottom:6px"><span>${done} av ${tot} økter</span><span style="font-weight:700;color:var(--ac)">${pct}%</span></div>
      <div class="prog-bg"><div class="prog-fg" style="width:${pct}%"></div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn p" id="bCont" style="flex:1">Fortsett</button>
        <button class="ic-btn" id="bVProg" title="Statistikk">${IC.stats}</button>

      const i=ST.history.length-1-ri,done=p.sessions.filter(s=>s.done).length;

function drawSetupTabs(n){
  const el=document.getElementById('setupTabs');if(!el)return;

  el.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{syncDef(tActive);tActive=+t.dataset.t;drawSetupTabs(n);drawSetupBody();};});
}
function drawSetupBody(){
  const el=document.getElementById('setupBody');if(!el)return;
  const def=tDefs[tActive];
  let h=`<div class="card"><div class="lbl">Navn på økt</div><input id="defName" type="text" value="${def.name}" style="margin-bottom:14px"><div id="exListSetup">`;
  def.exercises.forEach((ex,gi)=>{
    const isC=ex.type==='cardio';
    h+=`<div class="exrow">
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px">
        <input type="text" data-sdef="${gi}" value="${ex.name}" placeholder="Øvelse" style="flex:1;font-size:14px;min-height:40px">

        <div style="flex:2"><div class="lbl">Reps / område</div><input type="text" data-sdefr="${gi}" value="${ex.repRange||''}" placeholder="f.eks. 8-12" style="min-height:38px;font-size:14px"></div>
      </div>`:`<div style="font-size:12px;color:var(--ac);background:var(--ac-bg);padding:8px 10px;border-radius:8px">Kondisjon – tid og km logges i økten</div>`}
    </div>`;
  });
  h+=`</div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <input type="text" id="nExName" placeholder="Ny øvelse" style="flex:1;font-size:14px;min-height:42px">
      <select id="nExMg" style="width:118px;font-size:13px;min-height:42px">${ALL_MG.map(m=>`<option>${m}</option>`).join('')}</select>
    </div>
    <button class="btn p fw" id="bAddNew" style="margin-top:8px">+ Legg til øvelse</button>
  </div>`;
  el.innerHTML=h;
  el.querySelectorAll('[data-sdel]').forEach(b=>{b.onclick=()=>{syncDef(tActive);tDefs[tActive].exercises.splice(+b.dataset.sdel,1);drawSetupBody();};});
  document.getElementById('bAddNew')?.addEventListener('click',addSetupEx);
  document.getElementById('nExName')?.addEventListener('keydown',e=>{if(e.key==='Enter')addSetupEx();});
}
function addSetupEx(){
  const nEl=document.getElementById('nExName'),mg=document.getElementById('nExMg')?.value||MUSCLES[0];
  const name=(nEl?.value||'').trim();if(!name){nEl?.focus();return;}
  syncDef(tActive);
  if(mg==='Kondisjon')tDefs[tActive].exercises.push({name,muscle:'Kondisjon',type:'cardio',activity:'løpe',repRange:'',sets:[{duration:'',km:''}]});
  else tDefs[tActive].exercises.push({name,muscle:mg,repRange:'',sets:[{weight:'',reps:''},{weight:'',reps:''},{weight:'',reps:''}]});
  nEl.value='';drawSetupBody();
}
function syncDef(i){
  const def=tDefs[i];if(!def)return;
  const nm=document.getElementById('defName');if(nm)def.name=nm.value;
  document.querySelectorAll('[data-sdef]').forEach(inp=>{const gi=+inp.dataset.sdef;if(def.exercises[gi])def.exercises[gi].name=inp.value;});
  document.querySelectorAll('[data-sdefm]').forEach(sel=>{
    const gi=+sel.dataset.sdefm;if(!def.exercises[gi])return;
    const v=sel.value,wasC=def.exercises[gi].type==='cardio';
    def.exercises[gi].muscle=v;
    if(v==='Kondisjon'&&!wasC){def.exercises[gi].type='cardio';def.exercises[gi].sets=[{duration:'',km:''}];}
    else if(v!=='Kondisjon'&&wasC){delete def.exercises[gi].type;def.exercises[gi].sets=[{weight:'',reps:''},{weight:'',reps:''},{weight:'',reps:''}];}
  });
  document.querySelectorAll('[data-sdefn]').forEach(inp=>{
    const gi=+inp.dataset.sdefn;
    if(def.exercises[gi]&&def.exercises[gi].type!=='cardio'){const n=parseInt(inp.value)||3;def.exercises[gi].sets=Array.from({length:n},()=>({weight:'',reps:''}));}
  });
  document.querySelectorAll('[data-sdefr]').forEach(inp=>{const gi=+inp.dataset.sdefr;if(def.exercises[gi])def.exercises[gi].repRange=inp.value;});
}

/* ── PROGRESS ── */
function vProgress(){return buildPH(ST.program,false);}
function vHistDetail(){return buildPH(ST.history[ST.histIdx],true);}
function buildPH(p,isH=false){
  const done=p.sessions.filter(s=>s.done);
  const nav=`<div class="tbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn ic ghost" id="bBack">&larr;</button>
      <div><div class="lbl" style="margin-bottom:0">${isH?'Historikk':'Aktiv periode'}</div><h1>${p.name}</h1></div>
    </div>
    <button class="tbtn" id="bTheme">${ticon()}</button>
  </div>`;
  if(!done.length)return nav+`<p style="color:var(--tx2)">Ingen fullførte økter ennå.</p>${bnav(isH?'history':'stats')}`;
  const tv=done.reduce((a,s)=>a+sVol(s),0);
  const tkm=done.reduce((a,s)=>a+sKm(s),0);
  const dates=done.filter(s=>s.completedDate).map(s=>s.completedDate).sort();
  const rng=dates.length?`${fmt(dates[0])} – ${fmt(dates[dates.length-1])}`:'';
  const exNames=[...new Set(p.sessions.flatMap(s=>s.exercises.filter(e=>e.type!=='cardio').map(e=>e.name)))];
  const hasC=p.sessions.some(s=>s.exercises.some(e=>e.type==='cardio'));
  const tab=ST.stab||'volume';
  return`${nav}
  ${rng?`<p class="sub" style="margin-bottom:14px">${rng}</p>`:''}
  <div class="sgrid" style="margin-bottom:16px">
    <div class="sbox"><div class="snum2">${done.length}</div><div class="slbl">Fullførte</div></div>

/* ── HISTORY ── */
function vHistory(){
  let h=`<div class="tbar">
    <div><h1>Logg</h1><div class="sub">Avsluttede treningsperioder</div></div>
    <button class="tbtn" id="bTheme">${ticon()}</button>
  </div>`;
  if(!ST.history||!ST.history.length){
    h+=`<div class="card" style="text-align:center;padding:32px 16px;color:var(--tx2)">
      <div style="font-size:15px;font-weight:600">Ingen historikk ennå</div>
      <div style="font-size:13px;margin-top:4px">Fullfør og avslutt en periode for å se den her</div>
    </div>`;
  } else {
    ST.history.slice().reverse().forEach((p,ri)=>{
      const i=ST.history.length-1-ri,done=p.sessions.filter(s=>s.done).length;
      const tv=p.sessions.filter(s=>s.done).reduce((a,s)=>a+sVol(s),0);
      const tkm=p.sessions.filter(s=>s.done).reduce((a,s)=>a+sKm(s),0);
      const dates=p.sessions.filter(s=>s.completedDate).map(s=>s.completedDate).sort();
      const rng=dates.length?`${fmt(dates[0])} – ${fmt(dates[dates.length-1])}`:'';
      h+=`<div class="hcard" data-hi="${i}">
        <div class="hname">${p.name}</div>
        <div class="hmeta">${p.weeks} uker · ${done} økter · ${rng}</div>
        <div class="sgrid">
          <div class="sbox"><div class="snum2">${done}</div><div class="slbl">Økter</div></div>
          <div class="sbox"><div class="snum2">${(tv/1000).toFixed(1)}t</div><div class="slbl">Volum</div></div>
          <div class="sbox"><div class="snum2">${tkm>0?tkm.toFixed(0)+'km':'—'}</div><div class="slbl">Kondisjon</div></div>
        </div>
      </div>`;
    });
  }
  return h+bnav('history');
}

/* ── BIND ── */
function bindEvents(){
  const $=id=>document.getElementById(id);
  document.querySelectorAll('#bTheme').forEach(b=>{b.onclick=()=>{ST.theme=ST.theme==='dark'?'light':'dark';save(ST);applyTheme();render();};});
  bindNav();

  if(ST.view==='home'){
    $('bNew')?.addEventListener('click',()=>{ST.view='setup';save(ST);render();});
    $('bCont')?.addEventListener('click',()=>{ST.view='main';save(ST);render();});
    $('bVProg')?.addEventListener('click',()=>{ST.stab='volume';ST.view='progress';save(ST);render();});
    $('bFromTpl')?.addEventListener('click',()=>{ST.view='templates';save(ST);render();});
    $('bSaveTpl')?.addEventListener('click',()=>{
      const existing=document.getElementById('tplSaveForm');
      if(existing){existing.remove();return;}
      const anchor=document.querySelector('#app .card');
      const form=document.createElement('div');
      form.id='tplSaveForm';

      form.innerHTML=`<div class="lbl">Lagre som mal</div>
        <input id="tplNameInp" type="text" placeholder="Navn på malen" value="${ST.program.name}" style="margin-bottom:10px">
        <div style="display:flex;gap:8px">
          <button class="btn p fw" id="bConfirmTpl">Lagre mal</button>
          <button class="btn sm ghost" id="bCancelTpl">Avbryt</button>
        </div>
        <div id="tplMsg" style="font-size:13px;margin-top:8px;color:var(--green);display:none"></div>`;
      anchor.parentNode.insertBefore(form,anchor);
      document.getElementById('tplNameInp')?.focus();
      document.getElementById('bCancelTpl')?.addEventListener('click',()=>form.remove());
      document.getElementById('bConfirmTpl')?.addEventListener('click',()=>{
        const name=(document.getElementById('tplNameInp')?.value||'').trim();
        if(!name){document.getElementById('tplNameInp').style.borderColor='var(--rd)';return;}
        const p=ST.program;
        const defs=Array.from({length:p.sessionsPerWeek},(_,i)=>{
          const s=p.sessions[i];
          return{name:s.name,exercises:s.exercises.map(e=>{
            const isC=e.type==='cardio';
            return{name:e.name,muscle:e.muscle,type:isC?'cardio':undefined,repRange:e.repRange||'',activity:e.activity||'løpe',sets:isC?[{duration:'',km:''}]:Array.from({length:e.sets.length},()=>({weight:'',reps:''}))};
          })};
        });
        if(!ST.templates)ST.templates=[];
        ST.templates.push({name,weeks:p.weeks,defs,savedDate:today()});
        save(ST);
        const msg=document.getElementById('tplMsg');
        if(msg){msg.style.display='block';msg.textContent=`Malen "${name}" er lagret!`;}
        setTimeout(()=>form.remove(),1600);
      });
    });
    $('bArch')?.addEventListener('click',()=>{
      ST.program.archivedDate=today();
      ST.history.push(JSON.parse(JSON.stringify(ST.program)));
      ST.program=null;ST.view='home';save(ST);render();
    });
    $('bExp')?.addEventListener('click',()=>{ST.view='export';save(ST);render();});
    document.querySelectorAll('.hcard').forEach(el=>{el.onclick=()=>{ST.histIdx=+el.dataset.hi;ST.stab='volume';ST.view='histDetail';save(ST);render();};});
  }

  if(ST.view==='templates'){
    ST.templates&&ST.templates.forEach((_,i)=>{
      document.getElementById(`bViewTpl_${i}`)?.addEventListener('click',()=>{ST._tplIdx=i;ST.view='templateDetail';save(ST);render();});
      document.getElementById(`bUseTpl_${i}`)?.addEventListener('click',()=>{ST._tplIdx=i;ST.view='setupFromTpl';save(ST);render();});
      document.getElementById(`bDelTpl_${i}`)?.addEventListener('click',()=>{ST.templates.splice(i,1);save(ST);render();});
    });
  }
  if(ST.view==='templateDetail'){
    $('bBack')?.addEventListener('click',()=>{ST.view='templates';save(ST);render();});
    $('bUseTplDetail')?.addEventListener('click',()=>{ST.view='setupFromTpl';save(ST);render();});
  }
  if(ST.view==='setupFromTpl'){
    $('bBack')?.addEventListener('click',()=>{ST.view='templates';save(ST);render();});
    $('bStartTpl')?.addEventListener('click',()=>{
      const tpl=ST.templates[ST._tplIdx];if(!tpl)return;
      const w=parseInt($('iWeeks')?.value)||tpl.weeks||8;
      const name=($('iPName')?.value||'').trim()||(tpl.name+' '+new Date().getFullYear());
      if(ST.program){ST.program.archivedDate=today();ST.history.push(JSON.parse(JSON.stringify(ST.program)));ST.program=null;}
      const defs=JSON.parse(JSON.stringify(tpl.defs));
      defs.forEach(d=>d.exercises.forEach(e=>{if(e.type!=='cardio')delete e.type;}));
      ST.program=buildProg(w,defs.length,defs,name);
      ST.view='main';ST.curWeek=0;save(ST);render();
    });
  }
  if(ST.view==='export'){
    $('bBack')?.addEventListener('click',()=>{ST.view='home';save(ST);render();});
    $('bDl')?.addEventListener('click',()=>{
      const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),activeProgram:ST.program,history:ST.history,templates:ST.templates},null,2)],{type:'application/json'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`excel2pro_${today()}.json`;a.click();
    });
  }
  if(ST.view==='setup'){
    $('bBack')?.addEventListener('click',()=>{ST.view='home';save(ST);render();});
    $('bNext')?.addEventListener('click',()=>{
      const s=parseInt($('iSess').value)||3;
      tDefs=Array.from({length:s},(_,i)=>({name:`Økt ${i+1}`,exercises:[]}));
      tActive=0;$('setupArea').style.display='block';
      drawSetupTabs(s);drawSetupBody();
    });
    $('bStart')?.addEventListener('click',()=>{
      syncDef(tActive);
      const w=parseInt($('iWeeks').value)||8,s=parseInt($('iSess').value)||3;
      const name=($('iPName').value||'').trim()||('Program '+new Date().getFullYear());
      ST.program=buildProg(w,s,tDefs,name);
      ST.view='main';ST.curWeek=0;save(ST);render();
    });
  }
  if(ST.view==='main'){
    $('bPrev')?.addEventListener('click',()=>{if(ST.curWeek>0){ST.curWeek--;save(ST);render();}});
    $('bNxt')?.addEventListener('click',()=>{if(ST.curWeek<ST.program.weeks-1){ST.curWeek++;save(ST);render();}});
    document.querySelectorAll('.sc').forEach(el=>{el.onclick=()=>{ST.curSess=+el.dataset.idx;ST.view='session';save(ST);render();};});
  }
  if(ST.view==='session'){
    $('bBack')?.addEventListener('click',()=>{ST.view='main';save(ST);render();});
    $('bAddEx')?.addEventListener('click',()=>{
      const mg=$('selMg').value,name=($('inpEx').value||'').trim();
      if(!name){$('inpEx').style.borderColor='var(--rd)';$('inpEx').focus();return;}
      $('inpEx').style.borderColor='';$('inpEx').value='';
      if(mg==='Kondisjon')ST.program.sessions[ST.curSess].exercises.push({name,muscle:'Kondisjon',type:'cardio',activity:'løpe',repRange:'',sets:[{duration:'',km:''}]});
      else ST.program.sessions[ST.curSess].exercises.push({name,muscle:mg,repRange:'',sets:[{weight:'',reps:''},{weight:'',reps:''},{weight:'',reps:''}]});
      save(ST);render();
    });
    $('inpEx')?.addEventListener('keydown',e=>{if(e.key==='Enter')$('bAddEx')?.click();});
    document.querySelectorAll('.en').forEach(inp=>{
      inp.onchange=()=>{
        const ei=+inp.dataset.ei,p=ST.program,idx=ST.curSess;
        p.sessions[idx].exercises[ei].name=inp.value;
        const slot=idx%p.sessionsPerWeek;
        for(let w=Math.floor(idx/p.sessionsPerWeek)+1;w<p.weeks;w++){const fi=w*p.sessionsPerWeek+slot;if(p.sessions[fi]?.exercises[ei])p.sessions[fi].exercises[ei].name=inp.value;}
        save(ST);
      };
    });
    document.querySelectorAll('.wi').forEach(inp=>{
      inp.oninput=()=>{ST.program.sessions[ST.curSess].exercises[+inp.dataset.ei].sets[+inp.dataset.si].weight=inp.value;save(ST);upVol();};
      inp.onblur=()=>{
        if(+inp.dataset.si!==0)return;
        const ei=+inp.dataset.ei,val=inp.value;
        ST.program.sessions[ST.curSess].exercises[ei].sets.forEach((s,i)=>{if(i===0||s.weight!=='')return;s.weight=val;const o=document.querySelector(`.wi[data-ei="${ei}"][data-si="${i}"]`);if(o)o.value=val;});
        save(ST);
      };
    });
    document.querySelectorAll('.ri').forEach(inp=>{inp.oninput=()=>{ST.program.sessions[ST.curSess].exercises[+inp.dataset.ei].sets[+inp.dataset.si].reps=inp.value;save(ST);upVol();};});
    document.querySelectorAll('.act').forEach(b=>{b.onclick=()=>{ST.program.sessions[ST.curSess].exercises[+b.dataset.ei].activity=b.dataset.act;save(ST);render();};});
    document.querySelectorAll('.ctime').forEach(inp=>{inp.oninput=()=>{const ex=ST.program.sessions[ST.curSess].exercises[+inp.dataset.ei];if(!ex.sets[0])ex.sets[0]={duration:'',km:''};ex.sets[0].duration=inp.value;save(ST);};});
    document.querySelectorAll('.ckm').forEach(inp=>{inp.oninput=()=>{const ex=ST.program.sessions[ST.curSess].exercises[+inp.dataset.ei];if(!ex.sets[0])ex.sets[0]={duration:'',km:''};ex.sets[0].km=inp.value;save(ST);};});
    document.querySelectorAll('.as').forEach(b=>{b.onclick=()=>{const ex=ST.program.sessions[ST.curSess].exercises[+b.dataset.ei];ex.sets.push({weight:ex.sets.at(-1)?.weight||'',reps:''});save(ST);render();};});
    document.querySelectorAll('.ds').forEach(b=>{b.onclick=()=>{ST.program.sessions[ST.curSess].exercises[+b.dataset.ei].sets.splice(+b.dataset.si,1);save(ST);render();};});
    document.querySelectorAll('.de').forEach(b=>{b.onclick=()=>{if(ST.program.sessions[ST.curSess].exercises.splice(+b.dataset.ei,1)){}save(ST);render();};});
    $('bFinish')?.addEventListener('click',()=>{ST.program.sessions[ST.curSess].done=true;ST.program.sessions[ST.curSess].completedDate=today();save(ST);render();});
  }
  if(ST.view==='history'){
    document.querySelectorAll('.hcard').forEach(el=>{el.onclick=()=>{ST.histIdx=+el.dataset.hi;ST.stab='volume';ST.view='histDetail';save(ST);render();};});
  }
  if(ST.view==='progress'||ST.view==='histDetail'){
    $('bBack')?.addEventListener('click',()=>{ST.view=ST.view==='histDetail'?'history':'main';save(ST);render();});
    const prog=ST.view==='progress'?ST.program:ST.history[ST.histIdx];
    document.querySelectorAll('[data-stab]').forEach(t=>{t.onclick=()=>{ST.stab=t.dataset.stab;save(ST);render();};});
    buildCharts(prog);
    $('exSel')?.addEventListener('change',()=>drawEx(prog,$('exSel').value));
  }
}

/* ── HELPERS ── */
function getPrev(p,idx,name){
  const slot=idx%p.sessionsPerWeek,w0=Math.floor(idx/p.sessionsPerWeek);
  for(let w=w0-1;w>=0;w--){
    const ps=p.sessions[w*p.sessionsPerWeek+slot];if(!ps||!ps.done)continue;
    const ex=ps.exercises.find(e=>e.name===name);if(!ex||!ex.sets.length)continue;
    if(ex.type==='cardio'){const s=ex.sets[0]||{};return`${s.duration||0}min · ${s.km||0}km`;}
    return ex.sets.map((s,i)=>`S${i+1}: ${s.weight||0}kg×${s.reps||0}`).join(' · ');
  }return null;
}
function buildProg(weeks,spw,defs,name){
  const sessions=[];
  for(let w=0;w<weeks;w++)for(let s=0;s<spw;s++)sessions.push({name:defs[s].name,done:false,completedDate:null,exercises:JSON.parse(JSON.stringify(defs[s].exercises))});
  return{name,weeks,sessionsPerWeek:spw,sessions};
}
function upVol(){const el=document.getElementById('volNum');if(el)el.textContent=sVol(ST.program.sessions[ST.curSess]).toLocaleString('nb')+' kg';}

/* ── CHARTS ── */
const COLS=['#1c6ef3','#3db86a','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#10b981','#f97316','#6366f1','#84cc16','#14b8a6','#a78bfa'];
function buildCharts(p){
  const t=ST.stab||'volume';
  if(t==='volume')buildVolCharts(p);
  else if(t==='exercise'){const s=document.getElementById('exSel');if(s)drawEx(p,s.value);}
  else if(t==='muscle')drawMg(p);
  else if(t==='pr')drawPR(p);
  else if(t==='cal')drawCal(p);
  else if(t==='cardio')drawCardio(p);
}
function buildVolCharts(p){
  const done=p.sessions.filter(s=>s.done),lbls=done.map(s=>s.completedDate?fmtS(s.completedDate):'?');
  const vc=document.getElementById('cVol');
  if(vc)new Chart(vc,{type:'bar',data:{labels:lbls,datasets:[{data:done.map(s=>sVol(s)),backgroundColor:'#1c6ef3',borderRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v>=1000?(v/1000).toFixed(1)+'t':v}},x:{ticks:{font:{size:9},maxRotation:45}}}}});
  const wkV={};p.sessions.forEach((s,i)=>{if(!s.done)return;const k=`Uke ${Math.floor(i/p.sessionsPerWeek)+1}`;wkV[k]=(wkV[k]||0)+sVol(s);});
  const wc=document.getElementById('cWk');
  if(wc&&Object.keys(wkV).length)new Chart(wc,{type:'line',data:{labels:Object.keys(wkV),datasets:[{data:Object.values(wkV),borderColor:'#1c6ef3',backgroundColor:'rgba(28,110,243,0.1)',tension:0.35,fill:true,pointRadius:5,pointBackgroundColor:'#1c6ef3'}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v>=1000?(v/1000).toFixed(1)+'t':v}},x:{ticks:{font:{size:10}}}}}});
}
function drawEx(p,name){
  const data=[],lbls=[];
  p.sessions.forEach((s,i)=>{if(!s.done)return;const ex=s.exercises.find(e=>e.name===name);if(!ex||ex.type==='cardio')return;data.push(ex.sets.reduce((a,set)=>a+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0),0));lbls.push(s.completedDate?fmtS(s.completedDate):`U${Math.floor(i/p.sessionsPerWeek)+1}`);});
  const ctx=document.getElementById('cEx');if(!ctx)return;Chart.getChart(ctx)?.destroy();
  new Chart(ctx,{type:'line',data:{labels:lbls,datasets:[{data,borderColor:'#1c6ef3',backgroundColor:'rgba(28,110,243,0.1)',tension:0.3,fill:true,pointRadius:5,pointBackgroundColor:'#1c6ef3'}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true},x:{ticks:{font:{size:9},maxRotation:45}}}}});
}
function drawMg(p){
  const mgV={};MUSCLES.forEach(m=>mgV[m]=0);
  p.sessions.filter(s=>s.done).forEach(s=>s.exercises.forEach(ex=>{if(ex.type==='cardio')return;const v=ex.sets.reduce((a,set)=>a+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0),0);if(mgV[ex.muscle]!==undefined)mgV[ex.muscle]+=v;}));
  const keys=Object.keys(mgV).filter(k=>mgV[k]>0);
  const ctx=document.getElementById('cMg');if(ctx)new Chart(ctx,{type:'bar',data:{labels:keys,datasets:[{data:keys.map(k=>mgV[k]),backgroundColor:keys.map((_,i)=>COLS[i%COLS.length]),borderRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v>=1000?(v/1000).toFixed(1)+'t':v}},x:{ticks:{font:{size:10}}}}}});
  const d2=document.getElementById('cDo');if(d2&&keys.length)new Chart(d2,{type:'doughnut',data:{labels:keys,datasets:[{data:keys.map(k=>mgV[k]),backgroundColor:keys.map((_,i)=>COLS[i%COLS.length]),borderWidth:2}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:8,boxWidth:10}}}}});
}
function drawPR(p){
  const el=document.getElementById('prList');if(!el)return;
  const prs={};
  p.sessions.filter(s=>s.done).forEach(s=>s.exercises.forEach(ex=>{if(ex.type==='cardio')return;ex.sets.forEach(set=>{const w=parseFloat(set.weight)||0,r=parseInt(set.reps)||0,sc=w*r;if(!prs[ex.name]||sc>prs[ex.name].score)prs[ex.name]={weight:w,reps:r,score:sc,date:s.completedDate};});}));
  const sorted=Object.entries(prs).sort((a,b)=>b[1].score-a[1].score);
  el.innerHTML=sorted.length?sorted.map(([n,pr])=>`<div class="pr-row"><div><div style="font-weight:700;font-size:15px">${n}</div><div style="font-size:12px;color:var(--tx2)">${fmtS(pr.date)}</div></div><div style="text-align:right"><div style="font-weight:800;font-size:16px;color:var(--ac)">${pr.weight}kg × ${pr.reps}</div><div style="font-size:12px;color:var(--tx2)">${pr.score.toLocaleString('nb')} kg vol.</div></div></div>`).join(''):'<p style="color:var(--tx2)">Ingen data ennå.</p>';
}
function drawCal(p){
  const el=document.getElementById('calEl');if(!el)return;
  const td=new Set(p.sessions.filter(s=>s.done&&s.completedDate).map(s=>s.completedDate));
  if(!td.size){el.innerHTML='<p style="color:var(--tx2)">Ingen fullførte økter ennå.</p>';return;}
  const all=[...td].sort(),start=new Date(all[0]),end=new Date(all[all.length-1]);
  const cur=new Date(start);cur.setDate(cur.getDate()-((cur.getDay()+6)%7));
  let h=`<div class="cal">${['Ma','Ti','On','To','Fr','Lø','Sø'].map(d=>`<div class="ch2">${d}</div>`).join('')}`;
  while(cur<=end){const ds=cur.toISOString().slice(0,10);h+=`<div class="cd${td.has(ds)?' tr':''}">${cur.getDate()}</div>`;cur.setDate(cur.getDate()+1);}
  el.innerHTML=h+`</div><div style="display:flex;gap:10px;margin-top:10px;font-size:12px;color:var(--tx2)"><div style="display:flex;gap:4px;align-items:center"><div style="width:12px;height:12px;border-radius:3px;background:var(--green)"></div>Trente dager</div></div>`;
}
function drawCardio(p){
  const done=p.sessions.filter(s=>s.done&&sKm(s)>0);
  const lbls=done.map(s=>s.completedDate?fmtS(s.completedDate):'?');
  const c1=document.getElementById('cCkm');
  if(c1&&done.length)new Chart(c1,{type:'bar',data:{labels:lbls,datasets:[{data:done.map(s=>sKm(s)),backgroundColor:'#3db86a',borderRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true},x:{ticks:{font:{size:9},maxRotation:45}}}}});
  const paceD=done.filter(s=>sKm(s)>0&&sMin(s)>0).map(s=>parseFloat((sMin(s)/sKm(s)).toFixed(2)));
  const pLbls=done.filter(s=>sKm(s)>0&&sMin(s)>0).map(s=>s.completedDate?fmtS(s.completedDate):'?');
  const c2=document.getElementById('cCp');
  if(c2&&paceD.length)new Chart(c2,{type:'line',data:{labels:pLbls,datasets:[{data:paceD,borderColor:'#1c6ef3',backgroundColor:'rgba(28,110,243,0.1)',tension:0.3,fill:true,pointRadius:5,pointBackgroundColor:'#1c6ef3'}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{reverse:true,title:{display:true,text:'min/km'}},x:{ticks:{font:{size:9},maxRotation:45}}}}});
}
render();
</script>
</body>
